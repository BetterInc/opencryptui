name: Build and Release

on:
  push:
    branches:
      - '**'   # Runs the build for all branches when pushed
    tags:
      - 'v*'   # Triggers release when a tag is pushed
  pull_request:
    branches:
      - '**'   # Runs the build for all pull requests
  workflow_dispatch:   # Allow manual re-runs from the Actions tab

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # Don't cancel other OS jobs when one fails
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Setup minimal logging (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p ~/.config/QtProject
          echo -e "[Logging]\ndefault.debug=false\ndefault.warning=false" > ~/.config/QtProject/qtlogging.ini

      - name: Setup minimal logging (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # Windows uses AppData/Roaming path for Qt settings
          mkdir -p "$APPDATA/QtProject"
          echo -e "[Logging]\r\ndefault.debug=false\r\ndefault.warning=false" > "$APPDATA/QtProject/qtlogging.ini"

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up CMake
        if: matrix.os != 'windows-latest'
        uses: jwlawson/actions-setup-cmake@v2

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build git qtbase5-dev qtchooser qt5-qmake qtbase5-dev-tools libssl-dev libsodium-dev libargon2-dev xvfb

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # Use --no-upgrade to avoid "already installed" warnings
          for pkg in qt@5 openssl libsodium argon2 ninja; do
            brew list $pkg &>/dev/null && echo "$pkg is already installed" || brew install $pkg
          done
          brew link --force qt@5

      - name: Set environment variables for macOS
        if: matrix.os == 'macos-latest'
        run: |
          echo "ARGON2_LIB_DIR=$(brew --prefix argon2)/lib" >> $GITHUB_ENV
          echo "ARGON2_INCLUDE_DIR=$(brew --prefix argon2)/include" >> $GITHUB_ENV
          echo "SODIUM_LIB_DIR=$(brew --prefix libsodium)/lib" >> $GITHUB_ENV
          echo "SODIUM_INCLUDE_DIR=$(brew --prefix libsodium)/include" >> $GITHUB_ENV
          echo "Qt5_DIR=$(brew --prefix qt@5)/lib/cmake/Qt5" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@5)" >> $GITHUB_ENV
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl)" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl)/include" >> $GITHUB_ENV
          echo "OPENSSL_LIBRARIES=$(brew --prefix openssl)/lib" >> $GITHUB_ENV

      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-libsodium
            mingw-w64-x86_64-argon2
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-python
            cmake
            gcc
            mingw-w64-x86_64-ntldd
            git

      - name: Find Qt5 CMake directory
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          QT5_CONFIG=$(find /mingw64/ -name "Qt5Config.cmake" -o -name "qt5-config.cmake" | head -n 1)
          if [ -z "$QT5_CONFIG" ]; then
            echo "Qt5Config.cmake not found!"
            exit 1
          fi
          QT5_DIR=$(dirname ${QT5_CONFIG})
          echo "Qt5_DIR=${QT5_DIR}" >> $GITHUB_ENV
          echo "CMAKE_MODULE_PATH=${QT5_DIR}" >> $GITHUB_ENV

      - name: Build and set up dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          echo "Setting up environment variables..."
          echo "OPENSSL_ROOT_DIR=/mingw64" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/mingw64/include" >> $GITHUB_ENV
          echo "OPENSSL_CRYPTO_LIBRARY=/mingw64/lib/libcrypto.a" >> $GITHUB_ENV
          echo "OPENSSL_SSL_LIBRARY=/mingw64/lib/libssl.a" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=/mingw64" >> $GITHUB_ENV
          echo "ARGON2_LIB_DIR=/mingw64/lib" >> $GITHUB_ENV
          echo "ARGON2_INCLUDE_DIR=/mingw64/include" >> $GITHUB_ENV
          echo "SODIUM_LIB_DIR=/mingw64/lib" >> $GITHUB_ENV
          echo "SODIUM_INCLUDE_DIR=/mingw64/include" >> $GITHUB_ENV
          echo "/mingw64/bin" >> $GITHUB_PATH

          echo "Verifying installations..."
          pacman -Q mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja mingw-w64-x86_64-openssl mingw-w64-x86_64-libsodium mingw-w64-x86_64-argon2 mingw-w64-x86_64-qt5-base mingw-w64-x86_64-qt5-tools

      - name: Debug environment variables
        run: |
          echo "ARGON2_LIB_DIR: ${{ env.ARGON2_LIB_DIR }}"
          echo "ARGON2_INCLUDE_DIR: ${{ env.ARGON2_INCLUDE_DIR }}"
          echo "SODIUM_LIB_DIR: ${{ env.SODIUM_LIB_DIR }}"
          echo "SODIUM_INCLUDE_DIR: ${{ env.SODIUM_INCLUDE_DIR }}"
          echo "OPENSSL_ROOT_DIR: ${{ env.OPENSSL_ROOT_DIR }}"
          echo "OPENSSL_INCLUDE_DIR: ${{ env.OPENSSL_INCLUDE_DIR }}"
          echo "OPENSSL_CRYPTO_LIBRARY: ${{ env.OPENSSL_CRYPTO_LIBRARY }}"
          echo "OPENSSL_SSL_LIBRARY: ${{ env.OPENSSL_SSL_LIBRARY }}"
          echo "CMAKE_PREFIX_PATH: ${{ env.CMAKE_PREFIX_PATH }}"
          echo "CMAKE_MODULE_PATH: ${{ env.CMAKE_MODULE_PATH }}"
          echo "Qt5_DIR: ${{ env.Qt5_DIR }}"
          echo "PATH: ${{ env.PATH }}"

      - name: Configure CMake for Windows
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G "MinGW Makefiles" \
            -DOPENSSL_ROOT_DIR="${{ env.OPENSSL_ROOT_DIR }}" \
            -DOPENSSL_INCLUDE_DIR="${{ env.OPENSSL_INCLUDE_DIR }}" \
            -DOPENSSL_CRYPTO_LIBRARY="${{ env.OPENSSL_CRYPTO_LIBRARY }}" \
            -DOPENSSL_SSL_LIBRARY="${{ env.OPENSSL_SSL_LIBRARY }}" \
            -DCMAKE_PREFIX_PATH="${{ env.CMAKE_PREFIX_PATH }}" \
            -DCMAKE_MODULE_PATH="${{ env.CMAKE_MODULE_PATH }}" \
            -DQt5_DIR="${{ env.Qt5_DIR }}" \
            -DCMAKE_CXX_FLAGS="-DQT_CI_BUILD -DQT_NO_DEBUG_OUTPUT -DQT_NO_WARNING_OUTPUT"

      - name: Configure CMake for macOS/Linux
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_CXX_FLAGS="-DQT_CI_BUILD -DQT_NO_DEBUG_OUTPUT -DQT_NO_WARNING_OUTPUT"

      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: cmake --build build --config Release

      - name: Build for macOS/Linux
        if: matrix.os != 'windows-latest'
        shell: bash
        run: cmake --build build --config Release

      - name: Deploy Qt (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          # macdeployqt copies all Qt frameworks + plugins into the .app
          # bundle, then rewrites install_name_tool paths so the app runs
          # on any Mac without requiring Homebrew. MACOSX_BUNDLE in
          # CMakeLists.txt gives us the .app; macdeployqt populates it.
          APP="build/OpenCryptUI.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: $APP not found — is MACOSX_BUNDLE set on the target?"
            ls -la build/
            exit 1
          fi
          "$(brew --prefix qt@5)/bin/macdeployqt" "$APP" -verbose=1

          # Third-party dylibs we link directly (sodium/argon2) — macdeployqt
          # does copy them but may leave install_name pointing at Homebrew.
          # A quick otool sanity check so a later Gatekeeper run-test surfaces
          # any straggling /opt/homebrew/... paths early.
          echo "Linked dylibs after macdeployqt:"
          otool -L "$APP/Contents/MacOS/OpenCryptUI" | head -30

      - name: Deploy Qt (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          # windeployqt is the official Qt tool for bundling DLLs + plugins.
          # It replaces the previous hand-rolled ntldd/find/cp loop, which
          # was fragile to Qt/MSYS2 updates (DLL name suffixes kept drifting).
          #
          # MSYS2 ships the Qt5 variant as windeployqt-qt5.exe so Qt5 and Qt6
          # can coexist. Probe for that name first, fall back to the plain name
          # for any future layout that reverts, and fail loudly if neither exists.
          WDQT="$(command -v windeployqt-qt5 || command -v windeployqt || true)"
          if [ -z "$WDQT" ]; then
            echo "ERROR: no windeployqt found on PATH"
            ls /mingw64/bin/*deployqt* 2>/dev/null || true
            exit 1
          fi
          echo "Using windeployqt: $WDQT"

          if [ ! -f build/OpenCryptUI.exe ]; then
            echo "ERROR: build/OpenCryptUI.exe not found"
            ls -la build/
            exit 1
          fi

          # Shared flag set.  We deliberately suppress every runtime that the
          # app doesn't actually use so windeployqt doesn't try to bundle a
          # DLL that MSYS2's Qt5 build doesn't ship. Past incidents:
          #   - libGLESv2.dll missing → --no-angle
          #   - opengl32sw.dll missing → --no-opengl-sw
          #   - D3DCompiler_*.dll missing → --no-system-d3d-compiler
          # We don't use QML or Qt VirtualKeyboard — skip those too.
          WDQT_FLAGS=(
            --release
            --no-translations
            --no-system-d3d-compiler
            --no-opengl-sw
            --no-angle
            --no-virtualkeyboard
            --no-quick-import
          )

          # --dry-run first so the log shows what windeployqt WOULD copy.
          # If a future dep trips deployment, this makes the offender obvious
          # before the real run aborts.
          echo "=== windeployqt dry-run for OpenCryptUI.exe ==="
          "$WDQT" --dry-run "${WDQT_FLAGS[@]}" --compiler-runtime build/OpenCryptUI.exe || true

          echo "=== windeployqt real run ==="
          "$WDQT" "${WDQT_FLAGS[@]}" --compiler-runtime build/OpenCryptUI.exe

          # Test executables — they link Qt5::Test and would otherwise fail to
          # start silently (exit 1, no stderr) because Qt5Test.dll isn't a
          # direct dep of OpenCryptUI.exe.
          if [ -f build/OpenCryptUITest.exe ]; then
            "$WDQT" "${WDQT_FLAGS[@]}" build/OpenCryptUITest.exe
          fi
          if [ -f build/TestRoundtrip.exe ]; then
            "$WDQT" "${WDQT_FLAGS[@]}" build/TestRoundtrip.exe
          fi

          # MSYS2's windeployqt-qt5 reliably copies Qt's plugin tree
          # (platforms/, imageformats/, styles/, …) but does NOT copy
          # transitive native deps like libpcre2-16-0.dll, libharfbuzz-0.dll,
          # libicu*.dll, libpng16-16.dll, libfreetype-6.dll, libzstd.dll,
          # libbz2-1.dll, libiconv-2.dll, libglib-2.0-0.dll, libgraphite2.dll,
          # libintl-8.dll, libdouble-conversion.dll, libbrotli*.dll,
          # libmd4c.dll.  Without those, Qt5Core.dll can't load and the exe
          # dies at load time with STATUS_DLL_NOT_FOUND (exit 0xC0000135).
          #
          # Walk every .exe's dependency graph with ntldd and copy every
          # mingw DLL it references.  Applies to OpenCryptUI + all test exes.
          NTLDD=/mingw64/bin/ntldd.exe
          if [ ! -x "$NTLDD" ]; then
            echo "ERROR: ntldd missing from /mingw64/bin — can't resolve transitive deps"
            exit 1
          fi

          collect_deps() {
            local exe="$1"
            if [ ! -f "$exe" ]; then return 0; fi
            echo "Resolving deps for $exe ..."
            "$NTLDD" -R "$exe" | awk '/=>/ && /mingw/ && !/not found/ {print $3}' | sort -u
          }

          DEP_LIST="$(mktemp)"
          trap "rm -f $DEP_LIST" EXIT
          for exe in build/OpenCryptUI.exe build/OpenCryptUITest.exe \
                     build/TestRoundtrip.exe build/TestEngineTamper.exe \
                     build/TestEngineDowngrade.exe build/TestEngineKeyfile.exe \
                     build/TestEngineCipherMatrix.exe build/TestEngineKdf.exe; do
            collect_deps "$exe" >> "$DEP_LIST"
          done
          sort -u "$DEP_LIST" -o "$DEP_LIST"

          echo "=== Copying $(wc -l < $DEP_LIST) unique mingw DLLs into build/ ==="
          while IFS= read -r dll; do
            [ -f "$dll" ] && cp -f "$dll" build/ && echo "  $(basename "$dll")"
          done < "$DEP_LIST"

          # Third-party libs we link directly (sodium/argon2/openssl). ntldd
          # should already have caught these, but be explicit in case of a
          # static-link edge case.
          for pattern in "libsodium-*.dll" "libargon2*.dll" "libssl-*.dll" "libcrypto-*.dll"; do
            cp -f /mingw64/bin/$pattern build/ 2>/dev/null || true
          done

          # App resources (icons, etc.)
          if [ -d resources ]; then
            cp -rf resources build/
          fi

          echo "=== Final build/ listing ==="
          ls -la build/

      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: build/

      - name: Run tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -o pipefail
          cd build
          mkdir -p Testing/Temporary
          chmod +x run_tests.sh
          echo "Running tests with filtered output..."
          xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" ./run_tests.sh -v2 | tee Testing/Temporary/LastTest.log

      - name: Run tests (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -o pipefail
          cd build
          mkdir -p Testing/Temporary
          # CMake already configures run_tests_mac.sh into build/ on APPLE;
          # copy again defensively in case the configure_file path changes.
          if [ ! -f run_tests_mac.sh ]; then
            cp ../scripts/run_tests_mac.sh .
          fi
          chmod +x run_tests_mac.sh
          echo "Running tests with filtered output..."
          ./run_tests_mac.sh -v2 | tee Testing/Temporary/LastTest.log

      - name: Run tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Set-Location build

          Write-Host "=== build/ contents ==="
          Get-ChildItem

          foreach ($sub in @('platforms','imageformats','styles','iconengines','printsupport')) {
            if (Test-Path $sub) {
              Write-Host "=== $sub/ ==="
              Get-ChildItem $sub
            } else {
              Write-Host "NOTE: $sub/ does not exist"
            }
          }

          New-Item -ItemType Directory -Force -Path Testing\Temporary | Out-Null

          # QT_DEBUG_PLUGINS dumps every plugin/DLL Qt searches for on startup —
          # if a plugin is missing or the platforms directory isn't discoverable
          # this is where it shows up. Previous silent `exit 1` runs had zero
          # stderr because Windows eats load-time DLL errors in non-interactive
          # sessions. Let stderr flow to console + log.
          $env:QT_DEBUG_PLUGINS    = "1"
          $env:QT_LOGGING_RULES    = "*.debug=false"
          $env:QT_MESSAGE_PATTERN  = "[%{type}] %{message}"
          # Tell Qt to use the offscreen platform for headless CI; the
          # Windows runner has no interactive session. `minimal` also works
          # but offscreen is closer to what Linux uses.
          $env:QT_QPA_PLATFORM     = "minimal"

          Write-Host "=== Environment ==="
          Write-Host "QT_QPA_PLATFORM=$env:QT_QPA_PLATFORM"
          Write-Host "QT_DEBUG_PLUGINS=$env:QT_DEBUG_PLUGINS"
          Write-Host "PWD=$(Get-Location)"

          if (-not (Test-Path OpenCryptUITest.exe)) {
            Write-Host "ERROR: Test executable not found!"
            Get-ChildItem
            exit 1
          }

          Write-Host "=== Loader deps for OpenCryptUITest.exe (best effort) ==="
          # ntldd was installed via mingw-w64-x86_64-ntldd — use it to show
          # exactly which DLLs the test exe will ask for at load time.
          $ntldd = "$env:RUNNER_TEMP\msys64\mingw64\bin\ntldd.exe"
          if (-not (Test-Path $ntldd)) { $ntldd = "C:\msys64\mingw64\bin\ntldd.exe" }
          if (Test-Path $ntldd) {
            & $ntldd -R OpenCryptUITest.exe 2>&1 | Select-Object -First 40
          } else {
            Write-Host "NOTE: ntldd not found on either probe path"
          }

          Write-Host "=== Running OpenCryptUITest.exe -v2 ==="
          # Call the exe directly rather than via run_tests.bat so any stderr
          # is captured in the pipeline. Qt will print its plugin-search log
          # to stderr under QT_DEBUG_PLUGINS=1, and that's exactly what we
          # want to see on failure.
          & .\OpenCryptUITest.exe -v2 2>&1 | Tee-Object -FilePath Testing\Temporary\LastTest.log
          $exit = $LASTEXITCODE
          Write-Host "=== OpenCryptUITest.exe exit code: $exit ==="
          exit $exit

      # Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: build/Testing/Temporary/LastTest.log
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Linux build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-latest-build
          path: build-linux/
          if-no-files-found: error

      - name: Download macOS build artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-latest-build
          path: build-macos/
          if-no-files-found: error

      - name: Download Windows build artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-latest-build
          path: build-windows/
          if-no-files-found: error
          
      - name: Create resources directory for builds if needed
        run: |
          mkdir -p build-linux/resources 2>/dev/null || true
          mkdir -p build-macos/resources 2>/dev/null || true
          mkdir -p build-windows/resources 2>/dev/null || true

      - name: Create release directory
        run: mkdir -p release

      - name: Zip Linux build
        run: |
          cd build-linux
          zip -r ../release/opencryptui-linux-build.zip .

      - name: Zip macOS build
        run: |
          cd build-macos
          zip -r ../release/opencryptui-macos-build.zip .

      - name: Zip Windows build
        run: |
          cd build-windows
          zip -r ../release/opencryptui-windows-build.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/opencryptui-linux-build.zip
            release/opencryptui-macos-build.zip
            release/opencryptui-windows-build.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
